<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black Cat Icon - Pure Black Style -->
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a"/>
  
  <!-- Cat ears - black -->
  <polygon points="15,35 25,8 42,28" fill="#1a1a1a"/>
  <polygon points="58,28 75,8 85,35" fill="#1a1a1a"/>
  
  <!-- Inner ears -->
  <polygon points="22,32 28,15 38,28" fill="#2d2d2d"/>
  <polygon points="62,28 72,15 78,32" fill="#2d2d2d"/>
  
  <!-- Cat head -->
  <ellipse cx="50" cy="58" rx="32" ry="28" fill="#1a1a1a"/>
  
  <!-- Eyes - white with black pupils for contrast -->
  <ellipse cx="38" cy="52" rx="7" ry="9" fill="#ffffff"/>
  <ellipse cx="62" cy="52" rx="7" ry="9" fill="#ffffff"/>
  
  <!-- Pupils -->
  <circle cx="38" cy="52" r="4" fill="#000000"/>
  <circle cx="62" cy="52" r="4" fill="#000000"/>
  
  <!-- Eye shine -->
  <circle cx="40" cy="50" r="2" fill="#ffffff"/>
  <circle cx="64" cy="50" r="2" fill="#ffffff"/>
  
  <!-- Nose - small pink triangle -->
  <polygon points="47,62 53,62 50,66" fill="#ff6b9d"/>
  
  <!-- Whiskers - light gray -->
  <line x1="20" y1="60" x2="40" y2="62" stroke="#666666" stroke-width="1.5"/>
  <line x1="20" y1="64" x2="40" y2="64" stroke="#666666" stroke-width="1.5"/>
  <line x1="20" y1="68" x2="40" y2="66" stroke="#666666" stroke-width="1.5"/>
  
  <line x1="80" y1="60" x2="60" y2="62" stroke="#666666" stroke-width="1.5"/>
  <line x1="80" y1="64" x2="60" y2="64" stroke="#666666" stroke-width="1.5"/>
  <line x1="80" y1="68" x2="60" y2="66" stroke="#666666" stroke-width="1.5"/>
  
  <!-- Mouth -->
  <path d="M 46 68 Q 50 71 54 68" stroke="#666666" stroke-width="1.5" fill="none"/>
</svg>
